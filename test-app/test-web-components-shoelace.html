<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saxon-Forms Web Components Tests (Shoelace)</title>
    <script src="/lib/SaxonJS3.rt.js"></script>
    <script type="module" src="/lib/test-web-components-shoelace.js"></script>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        margin: 1rem 1.5rem;
      }
      #xForm fieldset {
        border: 1px solid #d0d7de;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      #xForm .field-row {
        display: grid;
        gap: 0.35rem;
        margin-bottom: 0.8rem;
      }
      #xForm .field-row .helper {
        color: #57606a;
        font-size: 0.85rem;
      }
      #xForm .repeat-row {
        border: 1px solid #d8dee4;
        border-radius: 6px;
        padding: 0.75rem;
        margin-bottom: 0.5rem;
      }
    </style>
    <script>
      window.addEventListener("DOMContentLoaded", function () {
        fetch("/xforms/test-web-components-shoelace.xml")
          .then(function (r) { return r.text(); })
          .then(function (xformText) {
            var parser = new DOMParser();
            var xformDoc = parser.parseFromString(xformText, "application/xml");
            SaxonJS.transform(
              {
                stylesheetLocation: "/sef/saxon-xforms.sef.json",
                sourceNode: xformDoc,
              },
              "async"
            );
          });
      });
    </script>
  </head>
  <body>
    <h1>Saxon-Forms Web Components Tests (Shoelace)</h1>
    <p>Shoelace web component bindings powered by local npm packages.</p>
    <div id="xForm"></div>
  </body>
</html>
