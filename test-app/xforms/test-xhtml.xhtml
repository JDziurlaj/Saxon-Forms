<?xml version="1.0" encoding="UTF-8"?>
<html
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:xf="http://www.w3.org/2002/xforms"
  xmlns:ev="http://www.w3.org/2001/xml-events">
  <head>
    <title>Saxon-Forms XHTML Source Test</title>
    <xf:model id="m-xhtml-direct">
      <xf:instance id="main">
        <data xmlns="">
          <value>alpha</value>
        </data>
      </xf:instance>
    </xf:model>
  </head>
  <body>
    <div id="xhtml-direct-root">
      <h2>XHTML direct source test</h2>
      <xf:input ref="instance('main')/value">
        <xf:label>Value</xf:label>
      </xf:input>
      <div id="xhtml-direct-value">
        <xf:output ref="instance('main')/value"/>
      </div>
    </div>
  </body>
</html>
