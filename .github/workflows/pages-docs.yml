name: docs-site

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

concurrency:
  group: docs-site
  cancel-in-progress: true

jobs:
  build-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Install Apache Ant
        run: |
          sudo apt-get update
          sudo apt-get install -y ant

      - name: Cache ant4docbook distribution
        uses: actions/cache@v4
        with:
          path: ant4docbook-0.10.0
          key: ant4docbook-0.10.0

      - name: Provision ant4docbook-0.10.0
        run: |
          if [ ! -f ant4docbook-0.10.0/ant4docbook-0.10.0.jar ]; then
            curl -fsSL --retry 5 --retry-delay 2 --retry-connrefused \
              -L "https://sourceforge.net/projects/ant4docbook/files/ant4docbook-0.10.0.tar.gz/download" \
              -o /tmp/ant4docbook-0.10.0.tar.gz
            tar -xzf /tmp/ant4docbook-0.10.0.tar.gz -C .
          fi
          test -f ant4docbook-0.10.0/ant4docbook-0.10.0.jar

      - name: Install dependencies
        run: npm ci

      - name: Build docs site artifact
        run: npm run site:build

      - name: Validate site links
        run: npm run site:validate

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: actions/upload-pages-artifact@v3
        with:
          path: builds/site

  deploy-pages:
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    needs: build-site
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
