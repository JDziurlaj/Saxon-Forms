name: docs-site

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

concurrency:
  group: docs-site
  cancel-in-progress: true

jobs:
  build-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Install Apache Ant
        run: |
          sudo apt-get update
          sudo apt-get install -y ant

      - name: Cache ant4docbook distribution
        uses: actions/cache@v4
        with:
          path: ant4docbook-0.10.0
          key: ant4docbook-0.10.0

      - name: Cache ant4docbook runtime assets
        uses: actions/cache@v4
        with:
          path: ~/.ant4docbook/V0.10.0
          key: ant4docbook-runtime-v0.10.0-v1

      - name: Provision ant4docbook-0.10.0
        run: |
          set -euxo pipefail
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Checking ant4docbook distribution cache"
          if [ ! -f ant4docbook-0.10.0/ant4docbook-0.10.0.jar ]; then
            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Downloading ant4docbook-0.10.0"
            curl -fsSL --retry 5 --retry-delay 2 --retry-connrefused \
              -L "https://sourceforge.net/projects/ant4docbook/files/ant4docbook-0.10.0.tar.gz/download" \
              -o /tmp/ant4docbook-0.10.0.tar.gz
            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Extracting ant4docbook-0.10.0"
            tar -xzf /tmp/ant4docbook-0.10.0.tar.gz -C .
          fi
          test -f ant4docbook-0.10.0/ant4docbook-0.10.0.jar
          if [ ! -f "$HOME/.ant4docbook/V0.10.0/css/jbossorg.css" ]; then
            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Provisioning runtime CSS assets"
            mkdir -p "$HOME/.ant4docbook/V0.10.0"
            unzip -o ant4docbook-0.10.0/ant4docbook-0.10.0.jar "css/*" -d "$HOME/.ant4docbook/V0.10.0"
          fi
          test -f "$HOME/.ant4docbook/V0.10.0/css/jbossorg.css"

      - name: Cache DocBook XSL snapshot
        uses: actions/cache@v4
        with:
          path: ~/.ant4docbook/docbook-xsl-2020-06-03
          key: docbook-xsl-2020-06-03-v1

      - name: Cache PlantUML jar
        uses: actions/cache@v4
        with:
          path: ~/.cache/plantuml
          key: plantuml-1.2025.4

      - name: Provision DocBook XSL snapshot
        run: |
          CACHE_ROOT="$HOME/.ant4docbook"
          VERSION_ROOT="$CACHE_ROOT/docbook-xsl-2020-06-03"
          SNAPSHOT_ROOT="$CACHE_ROOT/docbook-xsl-snapshot"
          NESTED_ROOT="$VERSION_ROOT/docbook-xsl-2020-06-03"

          mkdir -p "$CACHE_ROOT"

          if [ ! -f "$VERSION_ROOT/xhtml/docbook.xsl" ] && [ -f "$SNAPSHOT_ROOT/xhtml/docbook.xsl" ]; then
            rm -rf "$VERSION_ROOT"
            cp -R "$SNAPSHOT_ROOT" "$VERSION_ROOT"
          fi

          if [ ! -f "$VERSION_ROOT/xhtml/docbook.xsl" ]; then
            curl -fsSL --retry 5 --retry-delay 2 --retry-connrefused \
              -L "https://github.com/docbook/xslt10-stylesheets/releases/download/snapshot%2F2020-06-03/docbook-xsl-snapshot.zip" \
              -o /tmp/docbook-xsl-snapshot.zip
            rm -rf "$VERSION_ROOT" "$SNAPSHOT_ROOT"
            unzip -q /tmp/docbook-xsl-snapshot.zip -d "$CACHE_ROOT"
            mv "$SNAPSHOT_ROOT" "$VERSION_ROOT"
          fi

          if [ ! -e "$NESTED_ROOT" ]; then
            ln -s . "$NESTED_ROOT"
          fi

          test -f "$VERSION_ROOT/xhtml/docbook.xsl"
          test -f "$NESTED_ROOT/xhtml/docbook.xsl"

      - name: Install dependencies
        run: npm ci

      - name: Regenerate PlantUML diagrams (clean SVGs, no metadata)
        run: npm run docs:diagrams

      - name: Build docs site artifact
        run: npm run site:build

      - name: Validate site links
        run: npm run site:validate

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: actions/upload-pages-artifact@v3
        with:
          path: builds/site

  deploy-pages:
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    needs: build-site
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
